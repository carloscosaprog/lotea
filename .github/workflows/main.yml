name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - dev
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: lotea-frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd lotea-frontend
          npm install

      - name: Lint frontend
        run: |
          cd lotea-frontend
          npm run lint --if-present

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: lotea-backend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd lotea-backend
          npm install

      - name: Check backend runs
        run: |
          cd lotea-backend
          node src/server.js &
          sleep 5
